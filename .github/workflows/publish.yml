name: Publish to PyPI

# Triggers on a version tag push (e.g. git tag v0.1.1 && git push --tags)
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python build tools
        run: pip install build twine hatch hatch-jupyter-builder

      - name: Install JupyterLab (required for labextension build and jlpm)
        run: pip install "jupyterlab>=4.0.0,<5"

      - name: Install Node dependencies
        # NPM_TOKEN is used by .npmrc to pull @smartsbio/ui from GitHub Packages.
        # jlpm is JupyterLab's bundled yarn; use it (not npm) to keep the yarn lockfile valid.
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: jlpm install

      - name: Build extension (TypeScript + JupyterLab bundle)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: jlpm run build:prod

      - name: Build Python wheel and sdist
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/*
